  <circle cx="32" cy="34" r="24" fill="none" stroke="#2c6373" stroke-width="3.5"/>
  <circle cx="32" cy="34" r="16.5" fill="#12181a" stroke="#397d6b" stroke-width="2"/>
  <circle cx="32" cy="34" r="9.5" fill="rgba(240, 184, 75, 0.18)" stroke="#f0b84b" stroke-width="2.5"/>
  <g stroke="#58d6b2" stroke-linecap="round">
    <line x1="32" y1="34" x2="45" y2="13" stroke-width="4"/>
  </g>
  <circle cx="32" cy="34" r="3" fill="#58d6b2"/>
