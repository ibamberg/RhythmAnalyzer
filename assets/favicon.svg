<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Rhythm Analyzer">
  <!-- Иконка повторяет пад приложения: внешнее бирюзовое кольцо,
       среднее кольцо и янтарное ядро, плюс стрелка-метроном -->
